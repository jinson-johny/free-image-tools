<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>JPG to WebP Converter</title>

<style>

body{font-family:Arial;margin:0;background:#f4f6fb}

.layout{display:flex}

.sidebar{
width:220px;
background:white;
padding:20px;
border-right:1px solid #ddd;
}

.sidebar a{
display:block;
padding:10px;
text-decoration:none;
color:#333;
margin-bottom:6px;
}

.workspace{
flex:1;
padding:30px;
}

.upload{
border:2px dashed #aaa;
padding:40px;
text-align:center;
background:white;
border-radius:10px;
cursor:pointer;
}

.progress{
height:8px;
background:#eee;
margin-top:20px;
}

.progress div{
height:100%;
background:#4f46e5;
width:0%;
}

.result{
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
}

.ads{
width:300px;
background:white;
padding:20px;
border-left:1px solid #ddd;
}

.adbox{
background:#eee;
height:250px;
display:flex;
align-items:center;
justify-content:center;
}

</style>

</head>

<body>

<div class="layout">

<div class="sidebar">

<h3>Tools</h3>

<a href="jpg-to-webp.html">JPG → WebP</a>
<a href="png-to-jpg.html">PNG → JPG</a>
<a href="compress.html">Compress</a>
<a href="resize.html">Resize</a>
<a href="rotate.html">Rotate</a>
<a href="crop.html">Crop</a>
<a href="base64.html">Base64</a>

</div>

<div class="workspace">

<h1>JPG → WebP Converter</h1>

<div id="upload" class="upload">

Drag & Drop JPG Here

</div>

<div id="info"></div>

<div class="progress">

<div id="bar"></div>

</div>

<div id="result" class="result"></div>

</div>

<div class="ads">

<h3>Advertisement</h3>

<div class="adbox">
Ad Space
</div>

</div>

</div>

<script>

function formatSize(bytes){
let kb=bytes/1024
if(kb<1024) return kb.toFixed(2)+" KB"
return (kb/1024).toFixed(2)+" MB"
}

let upload=document.getElementById("upload")

upload.addEventListener("dragover",e=>e.preventDefault())

upload.addEventListener("drop",function(e){

e.preventDefault()

let file=e.dataTransfer.files[0]

process(file)

})

upload.onclick=function(){

let input=document.createElement("input")

input.type="file"

input.onchange=function(){
process(input.files[0])
}

input.click()

}

function process(file){

document.getElementById("info").innerHTML=

"Uploaded: "+file.name+
"<br>Input Size: "+formatSize(file.size)

document.getElementById("bar").style.width="30%"

let img=new Image()

img.src=URL.createObjectURL(file)

img.onload=function(){

let canvas=document.createElement("canvas")

canvas.width=img.width
canvas.height=img.height

let ctx=canvas.getContext("2d")

ctx.drawImage(img,0,0)

canvas.toBlob(function(blob){

document.getElementById("bar").style.width="100%"

let url=URL.createObjectURL(blob)

document.getElementById("result").innerHTML=

"<h3>Conversion Complete</h3>"+
"Output: converted.webp"+
"<br>Output Size: "+formatSize(blob.size)+
"<br><br><img src='"+url+"' width='250'><br><br>"+
"<a href='"+url+"' download='converted.webp'>Download</a>"

},"image/webp")

}

}

</script>

</body>
</html>
