<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>JPG to WebP Converter</title>

<link rel="stylesheet" href="../css/style.css">

</head>

<body>

<div class="layout">

<div class="sidebar" id="sidebar"></div>

<div class="workspace">

<h1>JPG to WebP Converter</h1>

<p>Upload JPG and convert to WebP.</p>

<div id="upload" class="upload">
Drag & Drop JPG or Click to Upload
</div>

<div id="upload-status"></div>

<div class="progress">
<div id="progress"></div>
</div>

<div id="result" class="result"></div>

</div>

<div class="ads">

<h3>Advertisement</h3>

<div class="adbox">Ad Space</div>

</div>

</div>

<footer>

<a href="../about.html">About</a>
<a href="../privacy.html">Privacy</a>
<a href="../contact.html">Contact</a>

</footer>

<script src="../js/layout.js"></script>
<script src="../js/tool-ui.js"></script>

<script>

setupTool("upload", function(file){

let img = new Image()

img.onload = function(){

let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

canvas.toBlob(function(blob){

let url=URL.createObjectURL(blob)

document.getElementById("result").innerHTML =
"<p>Output: "+file.name.replace('.jpg','.webp')+"</p>"+
"<p>Size: "+formatSize(blob.size)+"</p>"+
"<a href='"+url+"' download>Download WebP</a>"

},"image/webp",0.9)

}

img.src = URL.createObjectURL(file)

})

</script>

</body>
</html>
