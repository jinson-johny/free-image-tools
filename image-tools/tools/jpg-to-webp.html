<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>JPG to WebP Converter</title>

<link rel="stylesheet" href="../css/style.css">

<style>

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#f4f4f4;
}

.download-btn{
display:inline-block;
margin-top:15px;
padding:10px 18px;
background:#4CAF50;
color:white;
text-decoration:none;
border-radius:6px;
}

</style>

</head>

<body>

<div class="layout">

<div class="sidebar" id="sidebar"></div>

<div class="workspace">

<h1>JPG to WebP Converter</h1>

<p>Upload JPG and convert to WebP.</p>

<div id="upload" class="upload">
Drag & Drop JPG or Click to Upload
</div>

<div id="upload-status"></div>

<div class="progress">
<div id="progress"></div>
</div>

<div id="result"></div>

</div>

<div class="ads">

<h3>Advertisement</h3>

<div class="adbox">Ad Space</div>

</div>

</div>

<footer>

<a href="../about.html">About</a>
<a href="../privacy.html">Privacy</a>
<a href="../contact.html">Contact</a>

</footer>

<script src="../js/layout.js"></script>
<script src="../js/tool-ui.js"></script>

<script>

setupTool("upload", function(file){

/* INPUT TABLE */

document.getElementById("upload-status").innerHTML=

"<table>"+
"<tr><th colspan='2'>Input File Details</th></tr>"+
"<tr><td>File Name</td><td>"+file.name+"</td></tr>"+
"<tr><td>File Size</td><td>"+formatSize(file.size)+"</td></tr>"+
"<tr><td>File Type</td><td>"+file.type+"</td></tr>"+
"</table>"

let img=new Image()

img.onload=function(){

let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

canvas.toBlob(function(blob){

let url=URL.createObjectURL(blob)

/* COMPRESSION CALCULATION */

let saved = ((file.size - blob.size) / file.size) * 100
saved = saved.toFixed(2)

/* OUTPUT TABLE */

document.getElementById("result").innerHTML=

"<table>"+
"<tr><th colspan='2'>Output File Details</th></tr>"+
"<tr><td>Output Name</td><td>"+file.name.replace('.jpg','.webp')+"</td></tr>"+
"<tr><td>Output Size</td><td>"+formatSize(blob.size)+"</td></tr>"+
"<tr><td>Format</td><td>WebP</td></tr>"+
"<tr><td>Compression Saved</td><td>"+saved+" %</td></tr>"+
"</table>"+

"<a class='download-btn' href='"+url+"' download>Download WebP</a>"

},"image/webp",0.9)

}

img.src=URL.createObjectURL(file)

})

</script>

</body>
</html>
