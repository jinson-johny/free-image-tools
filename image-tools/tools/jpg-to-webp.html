<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>JPG to WebP Converter</title>

<link rel="stylesheet" href="../css/style.css">

<style>

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:left;
}

th{
background:#f4f4f4;
}

.download-btn{
display:inline-block;
margin-top:15px;
padding:10px 18px;
background:#4CAF50;
color:white;
text-decoration:none;
border-radius:6px;
}

.bar-container{
margin-top:20px;
}

.bar{
height:20px;
background:#ddd;
margin-top:5px;
border-radius:5px;
overflow:hidden;
}

.bar-fill-original{
height:100%;
background:#ff6b6b;
}

.bar-fill-compressed{
height:100%;
background:#4CAF50;
}

</style>

</head>

<body>

<div class="layout">

<div class="sidebar" id="sidebar"></div>

<div class="workspace">

<h1>JPG to WebP Converter</h1>

<p>Upload JPG and convert to WebP.</p>

<div id="upload" class="upload">
Drag & Drop JPG or Click to Upload
</div>

<div id="upload-status"></div>

<div class="progress">
<div id="progress"></div>
</div>

<div id="result"></div>

</div>

<div class="ads">

<h3>Advertisement</h3>
<div class="adbox">Ad Space</div>

</div>

</div>

<footer>

<a href="../about.html">About</a>
<a href="../privacy.html">Privacy</a>
<a href="../contact.html">Contact</a>

</footer>

<script src="../js/layout.js"></script>
<script src="../js/tool-ui.js"></script>

<script>

setupTool("upload", function(files){

let results = ""
let zip = new JSZip()

for(let i=0;i<files.length;i++){

let file = files[i]

let img = new Image()

img.onload=function(){

let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

canvas.width=img.width
canvas.height=img.height

ctx.drawImage(img,0,0)

canvas.toBlob(function(blob){

let saved=((file.size-blob.size)/file.size)*100
saved=saved.toFixed(2)

let name=file.name.replace(".jpg",".webp")

let url=URL.createObjectURL(blob)

results +=

"<tr>"+
"<td>"+file.name+"</td>"+
"<td>"+formatSize(file.size)+"</td>"+
"<td>"+formatSize(blob.size)+"</td>"+
"<td>"+saved+"%</td>"+
"<td><a href='"+url+"' download='"+name+"'>Download</a></td>"+
"</tr>"

document.getElementById("result").innerHTML=

"<table>"+
"<tr><th>File</th><th>Original</th><th>Compressed</th><th>Saved</th><th>Download</th></tr>"+
results+
"</table>"

zip.file(name, blob)

}, "image/webp",0.9)

}

img.src=URL.createObjectURL(file)

}

document.getElementById("download-all").onclick=function(){

zip.generateAsync({type:"blob"}).then(function(content){

let url=URL.createObjectURL(content)

let a=document.createElement("a")
a.href=url
a.download="converted-images.zip"
a.click()

})

}

})

</script>
<button id="download-all">
Download All as ZIP
</button>
</body>
</html>
