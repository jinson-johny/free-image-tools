<h1>JPG to WebP Converter</h1>

<div class="description">

<p>
Upload a JPG image to convert it into WebP format.
</p>

</div>

<div id="upload-area" class="upload-area">

Drag & Drop Image

</div>

<div id="upload-status"></div>

<div class="progress-bar">

<div id="progress"></div>

</div>

<script src="../js/tool-ui.js"></script>

<script>

setupTool("upload-area",function(file){

let img=new Image()

img.src=URL.createObjectURL(file)

img.onload=function(){

let canvas=document.createElement("canvas")

canvas.width=img.width
canvas.height=img.height

let ctx=canvas.getContext("2d")

ctx.drawImage(img,0,0)

canvas.toBlob(function(blob){

let size=blob.size

let url=URL.createObjectURL(blob)

document.getElementById("result").innerHTML=

"<p>Output File: converted.webp</p>"+
"<p>Output Size: "+(size/1024).toFixed(2)+" KB</p>"+
"<a href='"+url+"' download='converted.webp'>Download</a>"

},"image/webp")

}

})

</script>

</body>
