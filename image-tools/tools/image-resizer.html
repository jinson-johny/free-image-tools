<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Image Resizer</title>
<link rel="stylesheet" href="../css/style.css">
</head>

<body>

<div class="layout">

<div class="sidebar">

<h2>Tools</h2>

<a href="jpg-to-webp.html">JPG → WebP</a>
<a href="png-to-jpg.html">PNG → JPG</a>
<a href="webp-to-jpg.html">WebP → JPG</a>
<a href="image-compressor.html">Image Compressor</a>
<a href="image-resizer.html">Image Resizer</a>
<a href="image-rotate.html">Rotate Image</a>
<a href="image-crop.html">Crop Image</a>
<a href="image-base64.html">Image → Base64</a>

</div>

<div class="workspace">

<h1>Image Resizer</h1>

<div class="description">

<p>Resize an image to custom width and height.</p>

</div>

<input id="width" placeholder="Width">
<input id="height" placeholder="Height">

<div class="upload-area">
Drop Image
</div>

<div id="output"></div>

</div>

<div class="ads">
<h3>Advertisement</h3>
<p>Ad space</p>
</div>

</div>

<script src="../js/core.js"></script>

<script>

setupUpload(".upload-area",function(file){

let img=new Image();

img.src=URL.createObjectURL(file);

img.onload=function(){

let w=document.getElementById("width").value;
let h=document.getElementById("height").value;

let canvas=document.createElement("canvas");

canvas.width=w;
canvas.height=h;

let ctx=canvas.getContext("2d");

ctx.drawImage(img,0,0,w,h);

canvas.toBlob(function(blob){

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="resized.jpg";

link.innerText="Download Resized Image";

document.getElementById("output").appendChild(link);

});

}

});

</script>

</body>
</html>
