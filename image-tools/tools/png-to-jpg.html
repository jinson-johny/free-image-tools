<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>PNG to JPG Converter</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f4f4f4;
        }

        #download-all {
            margin-top: 20px;
            padding: 10px 20px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: none; /* Hidden until files are processed */
        }

        #download-all:hover {
            background: #ee5253;
        }
    </style>
</head>

<body>

    <div class="layout">
        <div class="sidebar" id="sidebar"></div>

        <div class="workspace">
            <h1>PNG to JPG Converter</h1>
            <p>Upload a PNG image to convert it to JPG.</p>

            <div id="upload" class="upload">
                Drag & Drop PNG Image or Click to Upload
            </div>

            <div id="upload-status"></div>

            <div class="progress">
                <div id="progress"></div>
            </div>

            <div id="result" class="result">
                </div>

            <button id="download-all">Download All as ZIP</button>
        </div>

        <div class="ads">
            <h3>Advertisement</h3>
            <div class="adbox">Ad Space</div>
        </div>
    </div>

    <footer>
        <a href="../about.html">About</a>
        <a href="../privacy.html">Privacy</a>
        <a href="../contact.html">Contact</a>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/tool-ui.js"></script>

    <script>
        let zip = new JSZip();
        let resultsHtml = "";

        setupTool("upload", function (file) {
            // Ensure we are dealing with a PNG (optional check)
            if (file.type !== "image/png") {
                alert("Please upload a PNG file.");
                return;
            }

            let img = new Image();
            img.onload = function () {
                let canvas = document.createElement("canvas");
                let ctx = canvas.getContext("2d");

                canvas.width = img.width;
                canvas.height = img.height;

                // Set white background (PNGs often have transparency, JPGs don't)
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw the image over the white background
                ctx.drawImage(img, 0, 0);

                // Convert to JPG blob (Quality set to 0.9)
                canvas.toBlob(function (blob) {
                    let saved = ((file.size - blob.size) / file.size) * 100;
                    let fileName = file.name.replace(/\.[^/.]+$/, "") + ".jpg";
                    let url = URL.createObjectURL(blob);

                    resultsHtml += `
                        <tr>
                            <td>${file.name}</td>
                            <td>${formatSize(file.size)}</td>
                            <td>${formatSize(blob.size)}</td>
                            <td>${saved.toFixed(2)}%</td>
                            <td><a href="${url}" download="${fileName}">Download</a></td>
                        </tr>`;

                    document.getElementById("result").innerHTML = `
                        <table>
                            <tr>
                                <th>File</th>
                                <th>Original</th>
                                <th>Converted</th>
                                <th>Saved</th>
                                <th>Action</th>
                            </tr>
                            ${resultsHtml}
                        </table>`;

                    zip.file(fileName, blob);
                    document.getElementById("download-all").style.display = "block";

                }, "image/jpeg", 0.9);
            };

            img.src = URL.createObjectURL(file);
        });

        document.getElementById("download-all").onclick = function () {
            zip.generateAsync({ type: "blob" }).then(function (content) {
                let url = URL.createObjectURL(content);
                let a = document.createElement("a");
                a.href = url;
                a.download = "png-to-jpg-converted.zip";
                a.click();
            });
        };
    </script>
</body>

</html>
